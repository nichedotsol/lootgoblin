<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Loot Goblin is a small browser minigame about hunting compute tokens in a cursed terminal ruin."
    />
    <title>Loot Goblin</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell" aria-label="Loot Goblin compute token hunt">
      <section class="cabinet">
        <header class="hud" aria-label="Game status">
          <div class="brand">
            <span class="goblin-sigil" aria-hidden="true"></span>
            <div>
              <h1>Loot Goblin</h1>
              <p>Hunt compute tokens in the terminal bog.</p>
            </div>
          </div>
          <div class="meter">
            <span>Tokens</span>
            <strong><span id="token-count">0</span>/12</strong>
          </div>
          <div class="meter">
            <span>Score</span>
            <strong id="score">0000</strong>
          </div>
          <div class="meter">
            <span>Time</span>
            <strong id="timer">01:45</strong>
          </div>
        </header>

        <div class="screen">
          <canvas id="game" width="1280" height="720" aria-label="Playable game arena"></canvas>
          <div class="crt-lines" aria-hidden="true"></div>
          <div class="crt-vignette" aria-hidden="true"></div>
          <div class="toast" id="toast" role="status" aria-live="polite">
            <strong>Sniff out the compute</strong>
            <span>Move with WASD or arrows. Dash with Shift. Avoid the audit beams.</span>
          </div>
        </div>

        <footer class="control-bar" aria-label="Controls">
          <div class="keys"><span>Move</span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd></div>
          <div class="keys"><span>Dash</span><kbd>Shift</kbd></div>
          <div class="keys"><span>Restart</span><button id="restart" type="button">R</button></div>
        </footer>
      </section>
    </main>

    <script src="./src/game.js"></script>
  </body>
</html>
